services:
  dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      # TEMP: host 5174 (5173 ocupado). Revertir a "5173:5173" cuando liberes el puerto.
      - "5174:5173"
      - "4001:4001"
    env_file:
      - path: .env
        required: false
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm install && npm run dev"

volumes:
  node_modules:
