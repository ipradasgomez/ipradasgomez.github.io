<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Tech Lead y Backend Engineer. Escalo plataformas y equipos para convertir complejidad técnica en resultados de negocio." />
    <meta property="og:site_name" content="Tekkisma" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Tekkisma" />
    <meta property="og:description" content="Tech Lead y Backend Engineer. Escalo plataformas y equipos para convertir complejidad técnica en resultados de negocio." />
    <meta property="og:url" content="https://tekkisma.es/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Tekkisma" />
    <meta name="twitter:description" content="Tech Lead y Backend Engineer. Escalo plataformas y equipos para convertir complejidad técnica en resultados de negocio." />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Tekkisma</title>
    <link rel="canonical" href="https://tekkisma.es/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script src="/mnt.js?v=__MNT_VERSION__"></script>
    <script>
      (function () {
        var ON = { true: 1, 1: 1, yes: 1, on: 1 }
        var OFF = { false: 1, 0: 1, 2: 1, no: 1, off: 1 }
        function parse(v) {
          if (v == null || v === '') return null
          v = String(v).trim().toLowerCase()
          if (ON[v]) return true
          if (OFF[v]) return false
          return null
        }
        var ls = parse(localStorage.getItem('mnt'))
        var site = parse(window.__SITE_MNT__)
        if (site === null && typeof window.__SITE_MNT__ === 'boolean') {
          site = window.__SITE_MNT__
        }
        var active = ls !== null ? ls : site === true
        window.__MNT_ACTIVE__ = active
        if (active) document.documentElement.classList.add('mnt')
      })()
    </script>
    <style>
      #mnt-shell {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        align-items: center;
        justify-content: center;
        background: rgb(12 11 10);
        background-image: radial-gradient(
          60rem 32rem at 50% -8rem,
          rgb(249 115 22 / 0.08),
          transparent 70%
        );
      }
      html.mnt #mnt-shell {
        display: flex;
      }
      html.mnt #app {
        visibility: hidden;
      }
      #mnt-shell img {
        height: 12rem;
        width: auto;
        object-fit: contain;
      }
      @media (min-width: 640px) {
        #mnt-shell img {
          height: 16rem;
        }
      }
      @media (min-width: 768px) {
        #mnt-shell img {
          height: 20rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="mnt-shell" aria-hidden="true">
      <img src="/favicon.svg" alt="" />
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
